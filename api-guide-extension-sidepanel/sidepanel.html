<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>网页引导助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #e2e2e2;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #0a0a0e;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { color: white; }

    .title {
      font-size: 12px;
      font-weight: 700;
      color: #e2e2e2;
      letter-spacing: 0.03em;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #2a2a2a;
      transition: background 0.3s;
    }
    .status-dot[data-state="loading"] { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot[data-state="done"]    { background: #10b981; }
    .status-dot[data-state="error"]   { background: #ef4444; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .btn-icon {
      width: 26px; height: 26px;
      background: transparent;
      border: none; border-radius: 5px;
      color: #555; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.06); color: #aaa; }

    .url-bar {
      padding: 6px 14px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .url-bar span {
      font-size: 10px; color: #444;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Chat area ── */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 6px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2a transparent;
    }
    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .chat-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-height: 160px;
      text-align: center;
      gap: 6px;
    }
    .chat-welcome-icon { font-size: 30px; margin-bottom: 4px; }
    .chat-welcome p { font-size: 12px; color: #444; }
    .chat-welcome .sub { font-size: 10px; color: #2e2e2e; }

    /* Message bubbles */
    .msg {
      display: flex;
      flex-direction: column;
    }
    .msg.user  { align-self: flex-end;  align-items: flex-end;   max-width: 88%; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; max-width: 94%; }

    .msg-bubble {
      padding: 9px 12px;
      border-radius: 11px;
      line-height: 1.55;
      font-size: 12px;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant .msg-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d0d0d0;
      border-bottom-left-radius: 3px;
    }
    .msg-bubble.is-error {
      background: rgba(239,68,68,0.07);
      border-color: rgba(239,68,68,0.2);
      color: #f87171;
    }

    /* Steps */
    .msg-steps {
      margin-top: 5px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    .step-item {
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 2px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      font-size: 11px; color: #bbb;
      line-height: 1.5;
      transition: all 0.15s;
    }
    .step-item.action {
      cursor: pointer;
      border-left-color: rgba(167,139,250,0.45);
    }
    .step-item.action:hover {
      background: rgba(167,139,250,0.07);
      border-color: rgba(167,139,250,0.35);
      border-left-color: rgba(167,139,250,0.7);
      color: #d4c5ff;
    }
    .step-item.warning { border-left-color: rgba(251,191,36,0.5); color: #c9980f; }
    .step-item.success { border-left-color: rgba(16,185,129,0.5); color: #2da875; }
    .step-item.info    { border-left-color: rgba(255,255,255,0.08); color: #666; }

    .step-target {
      margin-top: 5px;
      font-size: 10px; color: #555;
      display: flex; align-items: center; gap: 3px;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .cursor-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px;
      background: rgba(167,139,250,0.12);
      border-radius: 3px; flex-shrink: 0;
    }

    /* Typing dots */
    .typing {
      display: flex; align-items: center; gap: 4px;
      padding: 9px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 11px; border-bottom-left-radius: 3px;
      align-self: flex-start;
    }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: #555;
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,60%,100%{opacity:0.25;transform:scale(1)} 30%{opacity:1;transform:scale(1.25)} }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #0a0a0e;
      display: flex; flex-direction: column; gap: 7px;
    }

    .input-row {
      display: flex; gap: 6px; align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      padding: 8px 11px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e2e2e2; font-size: 12px; font-family: inherit;
      outline: none; resize: none;
      min-height: 36px; max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: rgba(124,58,237,0.6); }
    .chat-input::placeholder { color: #3a3a3a; }

    .btn-send {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none; border-radius: 7px;
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .btn-send:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); transform: translateY(-1px); }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .api-key-row {
      display: flex; gap: 6px;
    }
    .api-key-input {
      flex: 1; padding: 6px 9px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      color: #e2e2e2; font-size: 10px; font-family: inherit;
      outline: none;
    }
    .api-key-input:focus { border-color: rgba(124,58,237,0.45); }
    .api-key-input::placeholder { color: #2e2e2e; }
    .btn-save {
      padding: 6px 10px;
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 6px; color: #a78bfa;
      font-size: 10px; cursor: pointer; font-family: inherit;
      white-space: nowrap; transition: all 0.15s;
    }
    .btn-save:hover { background: rgba(124,58,237,0.28); }
    .save-status { font-size: 10px; color: #10b981; text-align: center; display: none; }
    .save-status.visible { display: block; }

    /* Page navigation divider */
    .page-divider {
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; color: #383838;
      padding: 2px 0; flex-shrink: 0;
    }
    .page-divider::before, .page-divider::after {
      content: ""; flex: 1; height: 1px;
      background: rgba(255,255,255,0.05);
    }
    .page-divider span {
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 160px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="title">网页引导助手</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
    <button class="btn-icon" id="btn-clear" title="清除对话">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="url-bar">
    <span id="current-url">等待页面...</span>
  </div>

  <div class="chat" id="chat">
    <div class="chat-welcome" id="chat-welcome">
      <div class="chat-welcome-icon">💬</div>
      <p>打开任意网页，告诉我你想做什么</p>
      <p class="sub">我会结合页面内容给出操作引导</p>
    </div>
  </div>

  <div class="footer">
    <div class="input-row">
      <textarea class="chat-input" id="chat-input" placeholder="告诉我你想做什么..." rows="1"></textarea>
      <button class="btn-send" id="btn-send">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <line x1="22" y1="2" x2="11" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" fill="currentColor"/>
        </svg>
      </button>
    </div>
    <div class="api-key-row">
      <input type="password" class="api-key-input" id="key-input" placeholder="DeepSeek API Key (sk-...)"/>
      <button class="btn-save" id="btn-save-key">保存</button>
    </div>
    <div class="save-status" id="save-status">✓ 已保存</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
