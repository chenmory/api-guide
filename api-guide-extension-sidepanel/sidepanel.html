<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>API Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f13;
      color: #e2e2e2;
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #0a0a0e;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { color: white; }

    .title {
      font-size: 13px;
      font-weight: 700;
      color: #e2e2e2;
      letter-spacing: 0.03em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
    }
    .status-dot[data-state="loading"] { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot[data-state="done"]    { background: #10b981; }
    .status-dot[data-state="error"]   { background: #ef4444; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .header-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 5px;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.06); color: #aaa; }
    .btn-icon[data-active="true"] { color: #a78bfa; }

    .url-bar {
      padding: 8px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    .url-bar span {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 200px;
      text-align: center;
      gap: 8px;
    }
    .welcome-icon { font-size: 32px; margin-bottom: 8px; }
    .welcome p { margin: 0; font-size: 13px; color: #555; }
    .welcome .sub { font-size: 11px; color: #333; }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      gap: 12px;
      color: #555;
      font-size: 12px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(167,139,250,0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .guidance { display: flex; flex-direction: column; gap: 6px; }

    .step-title {
      font-size: 12px;
      font-weight: 700;
      color: #a78bfa;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(167,139,250,0.15);
      margin-bottom: 4px;
    }

    .item {
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      line-height: 1.5;
      color: #ccc;
      font-size: 12px;
      transition: all 0.15s;
    }
    .item.action { cursor: pointer; }
    .item.action:hover { border-color: rgba(167,139,250,0.35); background: rgba(167,139,250,0.06); }
    .item.warning { background: rgba(251,191,36,0.06); border-color: rgba(251,191,36,0.2); color: #fbbf24; }
    .item.success { background: rgba(16,185,129,0.06); border-color: rgba(16,185,129,0.2); color: #10b981; }
    .item.info    { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05); color: #888; }

    .item-text { line-height: 1.5; }
    .item-target {
      margin-top: 6px;
      font-size: 10px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 4px;
      padding-top: 5px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .cursor-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      background: rgba(167,139,250,0.12);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 120px;
      gap: 10px;
      text-align: center;
    }
    .error-icon {
      width: 32px; height: 32px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #ef4444;
      font-weight: 700;
    }
    .error p { margin: 0; font-size: 12px; color: #888; line-height: 1.5; }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: #0a0a0e;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-analyze {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none;
      border-radius: 7px;
      color: white;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-analyze:hover {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(124,58,237,0.4);
    }

    .api-key-row {
      display: flex;
      gap: 6px;
    }
    .api-key-input {
      flex: 1;
      padding: 7px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #e2e2e2;
      font-size: 11px;
      font-family: inherit;
      outline: none;
    }
    .api-key-input:focus { border-color: #7c3aed; }
    .api-key-input::placeholder { color: #444; }
    .btn-save {
      padding: 7px 12px;
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 6px;
      color: #a78bfa;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-save:hover { background: rgba(124,58,237,0.35); }
    .save-status { font-size: 10px; color: #10b981; text-align: center; display: none; }
    .save-status.visible { display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="title">API Guide</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="btn-refresh" title="重新分析">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn-icon" id="btn-auto" title="自动模式" data-active="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="url-bar">
    <span id="current-url">等待页面...</span>
  </div>

  <div class="content" id="content">
    <div class="welcome">
      <div class="welcome-icon">⚡</div>
      <p>切换到任意 API 申请页面</p>
      <p class="sub">自动分析并显示操作指引</p>
    </div>
  </div>

  <div class="footer">
    <button class="btn-analyze" id="btn-analyze">分析当前页面</button>
    <div class="api-key-row">
      <input type="password" class="api-key-input" id="key-input" placeholder="DeepSeek API Key (sk-...)"/>
      <button class="btn-save" id="btn-save-key">保存</button>
    </div>
    <div class="save-status" id="save-status">✓ Key 已保存</div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
